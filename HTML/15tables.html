<!-- <tr></tr> display table row -->
<!-- <td></td> display table data -->
<!-- <th></th> didplay table header -->
<!-- <thead></thead> wrap table header -->
 <!-- <tbody></tbody> wrap table body -->
<!-- <tfoot> </tfoot> wrap table footer  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="black">
       <caption>Food Menu</caption> 
        <thead>
            <tr>
                <th rowspan="2">Item</th>
                <th colspan="2">Price</th>
            </tr>
            <tr>
                <th>INR</th>
                <th>USD</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Frooti</td>
                <td>10</td>
                <td>1</td>
            </tr>
        </tbody>
        <tbody>
            <tr>
                <td>Soda</td>
                <td>10</td>
                <td>1</td>
            </tr>
        </tbody>
        <tbody>
           <tr>
                <td>Momo</td>
                <td>10</td>
                <td>1</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
