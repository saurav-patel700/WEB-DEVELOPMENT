<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <form action="/server">
        choose your subject
        <input type="checkbox" id="math" name="subject" value="math"/>
        <label for="math">math </label>
        <input type="checkbox" id="science" name="subject" value="science" />
        <label for="science"> science </label>
          
        <div>
            <input type="radio" name="fruit" id="apple" value="apple" />
            <label for="apple"> apple</label>
            <input type="radio" name="fruit" id="mango" value="apple" />
            <label for="mango"> mango</label>
            <input type="radio" name="fruit" id="banana" value="apple"/>
            <label for="banana"> banana</label>
        </div>
        <div>
            Choose your proffesion
            <select name="proffesion" id="proffesion">
                <option value="stu">Student</option>
                <option value="dev">developer</option>
                <option selected >select your option</option>
            </select>
        </div>
        <label for="vol">Select your volume level :</label>
        <input type="range"
        id="vol"
        min="10"
        max="10000"
        name="vol"
        step="10"
        value="70"
        />
        <br />
        <label for="feedback"> Please give your feedback :</label>
        <textarea name="feedback" id="feedback" placeholder="here "></textarea>
        <button>Submit</button>
     </form>
</body>
</html>
