<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INLINE AND BLOCK TAG</title>
</head>
<body>
    <!-- block -->
    <h1> hello world</h1>
    <p>hello my world</p> 
    <div>
    <a href="www.google.com">google</a>
    <a href="www.facebook.com">facebook</a>
    </div>
    <hr />
    <!-- inline -->
    <a href="www.google.com">google</a>
    <a href="www.facebook.com">facebook</a>
    <a href="www.youtube.com">youtube</a>
    
    <img 
    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQXcIB-W2n5nsWUwzndyiZhc6w1DWkQiiI5fGP0hv9-Ug&s=10"
    /> 
    <span>
        <a href="www.google.com">google</a>
        <a href="www.facebook.com">facebook</a>
    </span>
    <img
     src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ80srprFKBqpLlDBUQxoVtzMb-BudsWkIC7Qt3qo1JpA&s=10"
    />
    
</body>
</html>
